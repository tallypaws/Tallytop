        body {
            background: none;
            user-select: none;
            -webkit-app-region: drag;
            overflow: hidden;
        }

        .wrapper {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;

            background: var(--bg);
            position: relative;
        }

        .message {
            top: 70%;
            word-break: break-word;
            padding: 0 16px;
            position: absolute;
            font-size: 14px;
        }

        p {
            text-align: center;
        }

        img {
            max-width: 256px;
            max-height: 164px;
            height: auto;
            width: auto;
            image-rendering: pixelated;
            border-radius: 1em;
        }

        #quote {
            font-size: 0.8rem;
            position: absolute;
            bottom: 0.5em;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 2em);
            color: var(--fg-semi-trans);
        }
    </style>
</head>
